<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Harilala Portfolio</title>
    <script type="text/javascript">
      // Redirect to index.html for SPA routing on GitHub Pages
      var path = window.location.pathname;
      var repoName = '/harilala-portfolio';

      // If we're in a subdirectory (GitHub Pages project), redirect to the index
      if (path.startsWith(repoName + '/')) {
        var redirectPath = repoName + '/?' + path.substring(repoName.length + 1);
        window.location.replace(window.location.origin + redirectPath + window.location.search + window.location.hash);
      } else {
        // Fallback for root access
        window.location.replace(window.location.origin + repoName + '/');
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
